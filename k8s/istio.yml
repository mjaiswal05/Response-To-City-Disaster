apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: beacon-dashboard
  namespace: ${NAMESPACE}
spec:
  hosts:
    - "beacon-tcd.tech"
  gateways:
    - beacon-gateway
  http:
    # IAM service routes - must come before dashboard catch-all
    - match:
        - uri:
            prefix: "/api/iam/"
      route:
        - destination:
            host: beacon-iam.${NAMESPACE}.svc.cluster.local
            port:
              number: 80
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
    # Dashboard catch-all route - must be last
    - match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: beacon-dashboard.${NAMESPACE}.svc.cluster.local
            port:
              number: 80
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
