server {
    # Listen on port 8080 (Cloud Run requirement)
    listen 8080;
    
    # Where our built files are
    root /usr/share/nginx/html;
    
    # Default file to serve
    index index.html;

    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/css application/javascript application/json;

    # ----------------------------------------------------------------------
    # FIX: Content Security Policy (CSP) for Keycloak Iframe
    # Solves: "Timeout when waiting for 3rd party check iframe message"
    # Allows the browser to trust content from your Keycloak server
    # ----------------------------------------------------------------------
    add_header Content-Security-Policy "frame-src 'self' https://beacon-keycloak-725967517047.europe-west2.run.app/*; frame-ancestors 'self' https://beacon-keycloak-725967517047.europe-west2.run.app";

    # Handle React Router (single page app)
    # All routes should serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}